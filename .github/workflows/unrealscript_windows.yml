name: Build UnrealScript (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Clone Outlast-Level-Editor
        shell: pwsh
        run: |
          git clone https://github.com/superboo07/Outlast-Level-Editor C:\Outlast-Level-Editor

      - name: Download and extract UDK
        shell: pwsh
        run: |
          pip install gdown
          gdown "https://drive.google.com/uc?id=1IZed_3QAivpnU2uPlSClFVs-YOZrIpcd" -O udkinstall.exe
          7z x udkinstall.exe Binaries -oC:\Outlast-Level-Editor

      - name: Copy Classes
        shell: pwsh
        run: |
          mkdir -Force C:\Outlast-Level-Editor\Development\Src\Multiplayer
          Copy-Item -Recurse Classes C:\Outlast-Level-Editor\Development\Src\Multiplayer\

      - name: Install dependencies
        shell: pwsh
        run: |
          choco install -y dotnet4.0 directx 7zip

      - name: Set up software GPU (Mesa3D Lavapipe + DXVK)
        shell: pwsh
        run: |
          # Check what's available
          Write-Host "=== Vulkan loader check ==="
          if (Test-Path "$env:SystemRoot\SysWOW64\vulkan-1.dll") {
            Write-Host "vulkan-1.dll found in SysWOW64"
          } else {
            Write-Host "vulkan-1.dll NOT found in SysWOW64"
          }
          if (Test-Path "$env:SystemRoot\System32\vulkan-1.dll") {
            Write-Host "vulkan-1.dll found in System32"
          } else {
            Write-Host "vulkan-1.dll NOT found in System32"
          }

          # Download Vulkan loader if missing
          if (-not (Test-Path "$env:SystemRoot\SysWOW64\vulkan-1.dll")) {
            Write-Host "Downloading Vulkan loader..."
            curl -L -o "$env:TEMP\VulkanRT.exe" "https://sdk.lunarg.com/sdk/download/latest/windows/VulkanRT-installer.exe"
            Start-Process -FilePath "$env:TEMP\VulkanRT.exe" -ArgumentList "/S" -Wait
          }

          # Download Mesa3D (Lavapipe software Vulkan driver)
          curl -L -o "$env:TEMP\mesa.7z" "https://github.com/pal1000/mesa-dist-win/releases/download/26.1.3/mesa3d-26.1.3-release-msvc.7z"
          7z x "$env:TEMP\mesa.7z" -o"$env:TEMP\mesa" -y | Out-Null

          # Download DXVK (D3D11-to-Vulkan translation)
          curl -L -o "$env:TEMP\dxvk.tar.gz" "https://github.com/doitsujin/dxvk/releases/download/v3.0.1/dxvk-3.0.1.tar.gz"
          tar -xzf "$env:TEMP\dxvk.tar.gz" -C "$env:TEMP"

          # Set Lavapipe as the Vulkan ICD
          $lvp_icd = "$env:TEMP\mesa\x86\lvp_icd.x86.json"
          $env:VK_ICD_FILENAMES = $lvp_icd
          echo "VK_ICD_FILENAMES=$env:VK_ICD_FILENAMES" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Copy DXVK 32-bit DLLs alongside UDK to intercept D3D11 calls
          $udk_dir = "C:\Outlast-Level-Editor\Binaries\Win32"
          Copy-Item "$env:TEMP\dxvk-3.0.1\x32\d3d11.dll"    "$udk_dir\d3d11.dll" -Force
          Copy-Item "$env:TEMP\dxvk-3.0.1\x32\dxgi.dll"     "$udk_dir\dxgi.dll" -Force
          Copy-Item "$env:TEMP\dxvk-3.0.1\x32\d3d10core.dll" "$udk_dir\d3d10core.dll" -Force
          Write-Host "DXVK deployed to $udk_dir"

      - name: Configure DefaultEngine.ini
        shell: pwsh
        run: |
          $ini = "C:\Outlast-Level-Editor\UDKGame\Config\DefaultEngine.ini"
          $content = Get-Content $ini
          $line = $content | Select-String -Pattern '^\+ModEditPackages=TAS$' | Select-Object -First 1
          if (-not ($content -match '^\+ModEditPackages=Multiplayer$')) {
            $content = $content -replace '^(\+ModEditPackages=TAS)$', "`$1`r`n+ModEditPackages=Multiplayer"
            Set-Content $ini $content
          }

      - name: Compile UnrealScript
        shell: pwsh
        run: |
          $log = "C:\Outlast-Level-Editor\UDKGame\Logs\Launch.log"
          $udk = "C:\Outlast-Level-Editor\Binaries\Win32\UDK.com"
          $udkDir = "C:\Outlast-Level-Editor\Binaries\Win32"
          $lvp_icd = "$env:TEMP\mesa\x86\lvp_icd.x86.json"
          $env:VK_ICD_FILENAMES = $lvp_icd

          Write-Host "=== Files in UDK dir ==="
          Get-ChildItem $udkDir | Select-Object Name, Length | Format-Table

          Write-Host "=== Launching UDK ==="
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          $proc = Start-Process -FilePath $udk -ArgumentList "make -log" -PassThru -NoNewWindow `
            -WorkingDirectory $udkDir `
            -RedirectStandardError "$env:TEMP\udk_stderr.txt"
          Write-Host "PID: $($proc.Id)"
          $exited = $proc.WaitForExit(120000)
          $sw.Stop()
          Write-Host "Elapsed: $($sw.Elapsed.TotalSeconds)s, Exited: $exited"
          if (-not $exited) {
            Write-Host "Process still running, checking for windows..."
            Get-Process | Where-Object { $_.MainWindowTitle } | Format-Table Id, ProcessName, MainWindowTitle
            $proc.Kill()
            Write-Host "##[error] UDK timed out after 2 minutes"
          }
          Write-Host "Exit code: $($proc.ExitCode)"
          if (Test-Path $log) {
            Write-Host "=== Launch.log ==="
            Get-Content $log -Tail 100
          } else {
            Write-Host "##[warning] Launch.log not found"
            Get-ChildItem "C:\Outlast-Level-Editor\UDKGame\Logs" -Recurse -ErrorAction SilentlyContinue
          }
          if (Test-Path "$env:TEMP\udk_stderr.txt") {
            Write-Host "=== stderr ==="
            Get-Content "$env:TEMP\udk_stderr.txt"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Multiplayer
          path: C:\Outlast-Level-Editor\UDKGame\Script\Multiplayer.u
          archive: false
