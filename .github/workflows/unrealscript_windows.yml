name: Build UnrealScript (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Clone Outlast-Level-Editor
        shell: pwsh
        run: |
          git clone https://github.com/superboo07/Outlast-Level-Editor C:\Outlast-Level-Editor

      - name: Download and extract UDK
        shell: pwsh
        run: |
          pip install gdown
          gdown "https://drive.google.com/uc?id=1IZed_3QAivpnU2uPlSClFVs-YOZrIpcd" -O udkinstall.exe
          7z x udkinstall.exe Binaries -oC:\Outlast-Level-Editor

      - name: Copy Classes
        shell: pwsh
        run: |
          mkdir -Force C:\Outlast-Level-Editor\Development\Src\Multiplayer
          Copy-Item -Recurse Classes C:\Outlast-Level-Editor\Development\Src\Multiplayer\

      - name: Install dependencies
        shell: pwsh
        run: |
          choco install -y dotnet4.0 directx

      - name: Set up virtual display
        shell: pwsh
        run: |
          $driver = "$env:TEMP\IddSampleDriver"
          mkdir -Force $driver
          curl -L -o "$driver\IddSampleDriver.zip" "https://github.com/ge9/IddSampleDriver/releases/download/0.0.1.4/IddSampleDriver.zip"
          Expand-Archive "$driver\IddSampleDriver.zip" -DestinationPath $driver -Force
          mkdir -Force C:\IddSampleDriver
          "@`n3" | Out-File -FilePath "C:\IddSampleDriver\option.txt" -Encoding ascii
          Copy-Item "$driver\IddSampleDriver\*" C:\IddSampleDriver\ -Force
          & "$driver\IddSampleDriver\installCert.bat"
          pnputil -i -a "C:\IddSampleDriver\iddsampledriver.inf"
          Start-Sleep 5

      - name: Configure DefaultEngine.ini
        shell: pwsh
        run: |
          $ini = "C:\Outlast-Level-Editor\UDKGame\Config\DefaultEngine.ini"
          $content = Get-Content $ini
          $line = $content | Select-String -Pattern '^\+ModEditPackages=TAS$' | Select-Object -First 1
          if (-not ($content -match '^\+ModEditPackages=Multiplayer$')) {
            $content = $content -replace '^(\+ModEditPackages=TAS)$', "`$1`r`n+ModEditPackages=Multiplayer"
            Set-Content $ini $content
          }

      - name: Compile UnrealScript
        shell: pwsh
        run: |
          $log = "C:\Outlast-Level-Editor\UDKGame\Logs\Launch.log"
          $proc = Start-Process -FilePath "C:\Outlast-Level-Editor\Binaries\Win32\UDK.com" `
            -ArgumentList "make -log" -PassThru -NoNewWindow `
            -RedirectStandardError "$env:TEMP\udk_stderr.txt"
          if (-not $proc.WaitForExit(300000)) {
            $proc.Kill()
            Write-Host "##[error] UDK timed out after 5 minutes"
          }
          Write-Host "Exit code: $($proc.ExitCode)"
          if (Test-Path $log) {
            Get-Content $log -Tail 100
          } else {
            Write-Host "##[warning] Launch.log not found at $log"
            Get-ChildItem "C:\Outlast-Level-Editor\UDKGame\Logs\" -Recurse
          }
          if (Test-Path "$env:TEMP\udk_stderr.txt") {
            Get-Content "$env:TEMP\udk_stderr.txt"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Multiplayer
          path: C:\Outlast-Level-Editor\UDKGame\Script\Multiplayer.u
          archive: false
